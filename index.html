<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phaxs Clicker</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#adminPanel {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 320px;
    max-height: 90vh;
    overflow-y: auto;
    background: #1e1e1e;
    border: 2px solid #00ff99;
    padding: 10px;
    display: none;
    z-index: 9999;
}

#adminPanel button {
    width: 100%;
    margin: 3px 0;
    padding: 6px;
    background: #333;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
}

#adminPanel button:hover {
    background: #444;
}

#adminPanel input {
    width: 100%;
    margin: 4px 0;
    padding: 5px;
}
</style>
</head>

<body>

<h1>Phaxs Clicker</h1>
<div id="content"></div>

<div id="adminPanel">

<h3>Admin Panel</h3>

<button onclick="resetAll()">RESET ALL</button>

<hr>

<input type="password" id="adminCodeInput" placeholder="Enter Code">
<button onclick="unlockAdmin()">Unlock Admin</button>

<div id="adminControls" style="display: none;">

<h4>Economy</h4>
<button onclick="modifyClicks(1000000)">+1M</button>
<button onclick="multiplyClicks(5)">x5</button>
<button onclick="divideClicks(2)">÷2</button>
<button onclick="randomizeClicks()">Randomize</button>
<button onclick="bankrupt()">Bankrupt</button>
<button onclick="gamble()">Gamble</button>
<button onclick="drainOverTime()">Drain Over Time</button>
<button onclick="explodeClicks()">Explode x50</button>
<button onclick="reverseClicks()">Reverse</button>
<button onclick="freezeClicks()">Freeze</button>
<button onclick="chaoticMoney()">Chaos Money</button>
<button onclick="massiveSpike()">Massive Spike</button>
<button onclick="slowDecay()">Slow Decay</button>
<button onclick="fastDecay()">Fast Decay</button>
<button onclick="tripleRandom()">Triple Random</button>
<button onclick="halveRandom()">Halve Random</button>
<button onclick="percentageBoost(250)">+250%</button>
<button onclick="percentageBoost(-50)">-50%</button>
<button onclick="prestigeBlast()">Prestige Blast</button>
<button onclick="nanoBoost()">Nano Boost</button>

<h4>Upgrades</h4>
<button onclick="maxUpgrades()">Max Upgrades</button>
<button onclick="wipeUpgrades()">Wipe Upgrades</button>
<button onclick="randomizeUpgrades()">Randomize Upgrades</button>
<button onclick="duplicateUpgrades()">Duplicate Upgrades</button>
<button onclick="corruptUpgrades()">Corrupt Upgrades</button>
<button onclick="boostUpgrades()">Boost Upgrades</button>
<button onclick="drainUpgrades()">Drain Upgrades</button>
<button onclick="invertUpgrades()">Invert Upgrades</button>
<button onclick="spikeUpgrades()">Spike Upgrades</button>
<button onclick="chaosUpgrades()">Chaos Upgrades</button>

<h4>Time</h4>
<button onclick="speedGame(10)">Speed x10</button>
<button onclick="speedGame(0.5)">Slow Motion</button>
<button onclick="rapidFire()">Rapid Fire</button>
<button onclick="superRapid()">Super Rapid</button>
<button onclick="ultraRapid()">Ultra Rapid</button>
<button onclick="tickStorm()">Tick Storm</button>
<button onclick="timeWarp()">Time Warp</button>
<button onclick="stutterMode()">Stutter Mode</button>

</div>
</div>

<script src="bundle.js"></script>
<script src="admin.js"></script>

<script>
document.addEventListener("keydown", function(e){
    if(e.key === "`"){
        const panel = document.getElementById("adminPanel");
        panel.style.display =
            panel.style.display === "block" ? "none" : "block";
    }
});
</script>

</body>
</html>
